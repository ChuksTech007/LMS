databases:
  - name: futolms-db
    plan: free
    databaseName: futolms
    user: futolms

services:
  - type: web
    name: futolms
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    autoDeploy: true

    envVars:
      - key: APP_NAME
        value: FUTO-SkillUP
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://futolms.onrender.com

      # Generate with: php artisan key:generate --show
      - key: APP_KEY
        sync: false

      # PostgreSQL — Render auto-provides these when you link the DB above
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: futolms-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: futolms-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: futolms-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: futolms-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: futolms-db
          property: password

      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://futolms.onrender.com/auth/google/callback

      - key: MAIL_MAILER
        value: log
