services:
  - type: web
    name: futolms
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free          # change to "starter" or higher for always-on
    healthCheckPath: /
    autoDeploy: true    # auto-deploy on every push to the connected branch

    envVars:
      - key: APP_NAME
        value: FUTO-SkillUP
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://futolms.onrender.com

      # Generate a secure APP_KEY once and paste it here,
      # or set it manually in the Render dashboard.
      # Run locally: php artisan key:generate --show
      - key: APP_KEY
        sync: false   # marks this as a secret you must set in the dashboard

      # Database — set these in the Render dashboard (never commit real values)
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      # Session / Cache / Queue (use file/database drivers — no Redis needed)
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local

      # Logging (stream to stderr so Render captures it)
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

      # Google OAuth (set in dashboard)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://futolms.onrender.com/auth/google/callback

      # Mail (set in dashboard if using real SMTP)
      - key: MAIL_MAILER
        value: log
